<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Chat Bareng</title>
<style>
  :root{
    --bg:#0f1115;
    --panel:#171a21;
    --bubble-me:#4f7cff;
    --bubble-other:#232733;
    --text:#e8e9ed;
    --muted:#8b8fa3;
    --accent:#4f7cff;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    background:var(--bg);
    color:var(--text);
    display:flex;
    justify-content:center;
    height:100vh;
  }
  #app{
    width:100%;
    max-width:480px;
    display:flex;
    flex-direction:column;
    height:100%;
    background:var(--panel);
  }
  header{
    padding:16px 20px;
    border-bottom:1px solid #262a35;
    display:flex;
    align-items:center;
    justify-content:space-between;
  }
  header h1{
    font-size:16px;
    margin:0;
    font-weight:600;
  }
  header span{
    font-size:12px;
    color:var(--muted);
  }
  #login{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:14px;
    padding:24px;
  }
  #login p{
    color:var(--muted);
    font-size:13px;
    text-align:center;
    max-width:280px;
  }
  #login input{
    width:100%;
    max-width:260px;
    padding:12px 14px;
    border-radius:10px;
    border:1px solid #2c3140;
    background:#0f1218;
    color:var(--text);
    font-size:14px;
    outline:none;
  }
  #login input:focus{border-color:var(--accent);}
  #login button{
    width:100%;
    max-width:260px;
    padding:12px 14px;
    border-radius:10px;
    border:none;
    background:var(--accent);
    color:white;
    font-size:14px;
    font-weight:600;
    cursor:pointer;
  }
  #login button:hover{opacity:.9;}
  #messages{
    flex:1;
    overflow-y:auto;
    padding:16px;
    display:flex;
    flex-direction:column;
    gap:8px;
  }
  .msg{
    max-width:75%;
    padding:9px 13px;
    border-radius:14px;
    font-size:14px;
    line-height:1.4;
    word-wrap:break-word;
  }
  .msg .name{
    font-size:11px;
    font-weight:600;
    margin-bottom:2px;
    opacity:.8;
  }
  .msg .time{
    font-size:10px;
    color:rgba(255,255,255,.5);
    margin-top:3px;
  }
  .me{
    align-self:flex-end;
    background:var(--bubble-me);
    border-bottom-right-radius:4px;
  }
  .other{
    align-self:flex-start;
    background:var(--bubble-other);
    border-bottom-left-radius:4px;
  }
  .system{
    align-self:center;
    color:var(--muted);
    font-size:11px;
    padding:4px 0;
  }
  #inputbar{
    display:flex;
    gap:8px;
    padding:12px;
    border-top:1px solid #262a35;
  }
  #inputbar input{
    flex:1;
    padding:12px 14px;
    border-radius:20px;
    border:1px solid #2c3140;
    background:#0f1218;
    color:var(--text);
    font-size:14px;
    outline:none;
  }
  #inputbar input:focus{border-color:var(--accent);}
  #inputbar button{
    padding:0 18px;
    border-radius:20px;
    border:none;
    background:var(--accent);
    color:white;
    font-weight:600;
    cursor:pointer;
  }
  #inputbar button:disabled{opacity:.5;cursor:default;}
  #status{
    font-size:11px;
    color:var(--muted);
    text-align:center;
    padding:4px 0;
  }
  ::-webkit-scrollbar{width:6px;}
  ::-webkit-scrollbar-thumb{background:#2c3140;border-radius:3px;}
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>💬 Chat Bareng</h1>
    <span id="whoami"></span>
  </header>

  <div id="login">
    <p>Masukkan nama kamu untuk mulai chat. Siapa pun yang membuka link/artefak ini akan masuk ke ruang obrolan yang sama.</p>
    <input id="nameInput" placeholder="Nama kamu..." maxlength="20">
    <button id="joinBtn">Masuk Chat</button>
  </div>

  <div id="chatView" style="display:none; flex:1; flex-direction:column; min-height:0;">
    <div id="status">Menghubungkan...</div>
    <div id="messages"></div>
    <div id="inputbar">
      <input id="msgInput" placeholder="Tulis pesan..." maxlength="500">
      <button id="sendBtn">Kirim</button>
    </div>
  </div>
</div>

<script>
const KEY = 'chatroom:general:messages';
let username = '';
let lastRenderedIds = new Set();
let pollTimer = null;

const loginView = document.getElementById('login');
const chatView = document.getElementById('chatView');
const nameInput = document.getElementById('nameInput');
const joinBtn = document.getElementById('joinBtn');
const msgInput = document.getElementById('msgInput');
const sendBtn = document.getElementById('sendBtn');
const messagesEl = document.getElementById('messages');
const statusEl = document.getElementById('status');
const whoamiEl = document.getElementById('whoami');

function escapeHtml(str){
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function timeStr(ts){
  const d = new Date(ts);
  return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
}

async function loadMessages(){
  try{
    const res = await window.storage.get(KEY, true);
    return res && res.value ? JSON.parse(res.value) : [];
  }catch(e){
    return [];
  }
}

async function saveMessages(list){
  try{
    await window.storage.set(KEY, JSON.stringify(list), true);
    return true;
  }catch(e){
    console.error('Gagal menyimpan pesan', e);
    return false;
  }
}

function renderMessages(list){
  const wasAtBottom = messagesEl.scrollHeight - messagesEl.scrollTop - messagesEl.clientHeight < 60;
  messagesEl.innerHTML = '';
  list.forEach(m => {
    const div = document.createElement('div');
    if(m.type === 'system'){
      div.className = 'system';
      div.textContent = m.text;
    } else {
      div.className = 'msg ' + (m.user === username ? 'me' : 'other');
      div.innerHTML =
        (m.user === username ? '' : '<div class="name">' + escapeHtml(m.user) + '</div>') +
        '<div>' + escapeHtml(m.text) + '</div>' +
        '<div class="time">' + timeStr(m.time) + '</div>';
    }
    messagesEl.appendChild(div);
  });
  if(wasAtBottom){
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }
}

async function pollLoop(){
  const list = await loadMessages();
  const idsNow = list.map(m => m.id).join(',');
  if(idsNow !== [...lastRenderedIds].join(',')){
    lastRenderedIds = new Set(list.map(m => m.id));
    renderMessages(list);
  }
  statusEl.textContent = 'Terhubung • ' + list.length + ' pesan';
}

async function sendMessage(text){
  if(!text.trim()) return;
  sendBtn.disabled = true;
  const list = await loadMessages();
  list.push({
    id: Date.now() + '-' + Math.random().toString(36).slice(2,7),
    user: username,
    text: text.trim(),
    time: Date.now(),
    type: 'msg'
  });
  await saveMessages(list);
  lastRenderedIds = new Set(list.map(m => m.id));
  renderMessages(list);
  sendBtn.disabled = false;
}

async function join(){
  const name = nameInput.value.trim();
  if(!name) return;
  username = name;
  whoamiEl.textContent = 'sebagai ' + username;
  loginView.style.display = 'none';
  chatView.style.display = 'flex';

  const list = await loadMessages();
  list.push({
    id: Date.now() + '-sys',
    type: 'system',
    text: username + ' bergabung ke chat',
    time: Date.now()
  });
  await saveMessages(list);
  lastRenderedIds = new Set(list.map(m => m.id));
  renderMessages(list);

  pollTimer = setInterval(pollLoop, 2500);
  msgInput.focus();
}

joinBtn.addEventListener('click', join);
nameInput.addEventListener('keydown', e => { if(e.key === 'Enter') join(); });

sendBtn.addEventListener('click', () => {
  const text = msgInput.value;
  msgInput.value = '';
  sendMessage(text);
});
msgInput.addEventListener('keydown', e => {
  if(e.key === 'Enter'){
    const text = msgInput.value;
    msgInput.value = '';
    sendMessage(text);
  }
});
</script>
</body>
</html>
